name: Build APK with Bubblewrap (npx)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload PWA artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build APK with npx
        run: |
          MANIFEST_URL="${{ steps.deployment.outputs.page_url }}manifest.json"
          echo "Using manifest from: $MANIFEST_URL"
          
          # Direkt mit npx ausführen (keine Installation nötig)
          npx @bubblewrap/cli init \
            --manifest "$MANIFEST_URL" \
            --package-name "io.github.ngd3v.testpwa" \
            --app-name "PWA Test App" \
            --app-version "1.0.0"
          
          npx @bubblewrap/cli build
          
          # APK finden
          mkdir -p apk-upload
          find ./android-app -name "*.apk" -exec cp {} ./apk-upload/pwa-app.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pwa-apk
          path: apk-upload/pwa-app.apk
