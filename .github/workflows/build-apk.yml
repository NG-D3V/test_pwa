name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build APK
        run: |
          # URL der deployed Seite
          APP_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          MANIFEST_URL="${APP_URL}manifest.json"
          
          echo "Building APK from: $MANIFEST_URL"
          
          # APK mit npx bauen
          npx @pwabuilder/cli@latest package \
            --manifest "$MANIFEST_URL" \
            --platform android \
            --output ./apk-output \
            --androidOptions '{"signingMode": "debug", "packageId": "io.github.ngd3v.testpwa"}'
          
          # APK für Upload vorbereiten
          mkdir -p apk-upload
          find ./apk-output -name "*.apk" -exec cp {} ./apk-upload/app.apk \;
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: apk-upload/app.apk
