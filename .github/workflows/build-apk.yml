name: Build APK from PWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-and-build-apk:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload PWA artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA project
        run: |
          MANIFEST_URL="${{ steps.deployment.outputs.page_url }}/manifest.json"
          bubblewrap init \
            --manifest="$MANIFEST_URL" \
            --directory=./twa \
            --jdk-path="$JAVA_HOME" \
            --skip-prompt

      - name: Build APK
        run: |
          cd twa
          bubblewrap build --generateSigningKey --skip-prompt

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-apk
          path: twa/app-release-signed.apk
