name: Build APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload PWA artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Build APK with Docker
        run: |
          APP_URL="${{ steps.deployment.outputs.page_url }}"
          echo "Building APK from: $APP_URL"
          
          # Verwende das offizielle PWA2APK Docker Image
          docker run --rm -v $(pwd):/app -w /app \
            --entrypoint sh ghcr.io/pwa-builder/pwabuilder:latest -c \
            "pwabuilder package --manifest ${APP_URL}manifest.json --platform android --output ./apk-output"
          
          # APK finden
          mkdir -p apk-upload
          find ./apk-output -name "*.apk" -exec cp {} ./apk-upload/pwa-app.apk \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pwa-apk
          path: apk-upload/pwa-app.apk
