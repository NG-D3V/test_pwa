name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install PWABuilder
        run: npm install -g @pwabuilder/cli
        
      - name: Build APK
        run: |
          # Warte kurz, bis GitHub Pages bereit ist
          sleep 10
          
          # URL der deployed Seite
          APP_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          MANIFEST_URL="${APP_URL}manifest.json"
          
          echo "Building APK from: $MANIFEST_URL"
          
          # APK bauen
          pwabuilder package \
            --manifest "$MANIFEST_URL" \
            --platform android \
            --output ./apk-output \
            --androidOptions '{"signingMode": "debug", "packageId": "io.github.ngd3v.testpwa"}'
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: apk-output/**/*.apk
