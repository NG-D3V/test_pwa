name: Build APK from PWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-and-build-apk:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload PWA artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PWA Builder CLI
        run: |
          npm install -g @pwabuilder/cli
          # Stelle sicher, dass pwabuilder im PATH ist
          echo "$(npm root -g)/bin" >> $GITHUB_PATH

      - name: Build APK using Bubblewrap
        run: |
          # Hole die manifest.json von der deployed Seite
          MANIFEST_URL="${{ steps.deployment.outputs.page_url }}manifest.json"
          echo "Using manifest from: $MANIFEST_URL"
          
          # Erstelle ein temporäres Verzeichnis für die App
          mkdir -p app-build
          cd app-build
          
          # Initialisiere ein Node.js Projekt
          npm init -y
          
          # Installiere bubblewrap direkt
          npm install @bubblewrap/cli
          
          # Erstelle die Android App mit Bubblewrap
          npx @bubblewrap/cli init \
            --manifest "$MANIFEST_URL" \
            --package-name "io.github.ngd3v.testpwa" \
            --app-name "PWA Test App"
          
          # Baue die APK
          npx @bubblewrap/cli build
          
          # Kopiere die APK in das Ausgabeverzeichnis
          cd ..
          mkdir -p apk-upload
          find app-build -name "*.apk" -exec cp {} ./apk-upload/pwa-app.apk \;
          
          # Debug: Zeige an, ob die APK gefunden wurde
          ls -la apk-upload/ || echo "No APK found"

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-apk
          path: apk-upload/pwa-app.apk
