name: Build APK from PWA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-and-build-apk:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload PWA artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PWA Builder CLI
        run: npm install -g @pwabuilder/cli

      - name: Build APK from deployed PWA
        run: |
          MANIFEST_URL="${{ steps.deployment.outputs.page_url }}/manifest.json"
          pwabuilder package \
            --manifest "$MANIFEST_URL" \
            --platform android \
            --output ./apk-output \
            --androidOptions '{"signingMode": "debug", "packageId": "io.github.ngd3v.testpwa"}'
          # pwabuilder erzeugt die APK im Unterordner des Ausgabeverzeichnisses
          mkdir -p apk-upload
          find ./apk-output -name "*.apk" -exec cp {} ./apk-upload/pwa-app.apk \;

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-apk
          path: apk-upload/pwa-app.apk
