name: Build APK with pwa2apk

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload PWA artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Setup Java (für Android Build)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pwa2apk
        run: npm install -g pwa2apk

      - name: Build APK
        run: |
          APP_URL="${{ steps.deployment.outputs.page_url }}"
          echo "Building APK from: $APP_URL"
          pwa2apk "$APP_URL" --output ./apk-output
          
          # Erstelle apk-upload Verzeichnis und kopiere die APK
          mkdir -p apk-upload
          find apk-output -name "*.apk" -exec cp {} ./apk-upload/pwa-app.apk \;

      - name: Upload APK as artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pwa-apk
          path: apk-upload/pwa-app.apk
